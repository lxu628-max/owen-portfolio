<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owen's Portfolio</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#" class="nav-logo" data-section="home">Owen</a>
      <div class="nav-links">
        <a href="#" class="nav-link active" data-section="home">首页</a>
        <a href="#" class="nav-link" data-section="about">关于我</a>
        <a href="#" class="nav-link" data-section="sports">体育（竞技）</a>
        <a href="#" class="nav-link" data-section="academic">学术成就</a>
        <a href="#" class="nav-link" data-section="tibet">西藏</a>
        <a href="#" class="nav-link" data-section="clubs">社团</a>
      </div>
      <div class="nav-toggle" id="navToggle">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main id="mainContent">

    <!-- ========== 首页 ========== -->
    <section class="page-section active" id="page-home">
      <div class="home-hero">
        <div class="home-left">
          <div class="hero-text" id="heroText">
            <h1>你好，我是 Owen</h1>
            <p class="hero-subtitle">YCIS IB 学生 | 科技爱好者 | 竞技游泳运动员</p>
            <p class="hero-desc">热爱探索科技前沿，在水中挑战极限，用教育连接远方。</p>
          </div>
          <div class="carousel-container" id="homeCarousel">
            <div class="carousel-track"></div>
            <button class="carousel-btn carousel-prev">&#10094;</button>
            <button class="carousel-btn carousel-next">&#10095;</button>
            <div class="carousel-dots"></div>
          </div>
        </div>
        <div class="home-right">
          <div class="news-panel">
            <h2>动态 / 更新</h2>
            <div class="news-list" id="newsList"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ========== 关于我 ========== -->
    <section class="page-section" id="page-about">
      <div class="section-header">
        <h1>关于我</h1>
        <div class="section-divider"></div>
      </div>
      <div class="about-layout">
        <div class="about-left">
          <div class="carousel-container" id="aboutCarousel">
            <div class="carousel-track"></div>
            <button class="carousel-btn carousel-prev">&#10094;</button>
            <button class="carousel-btn carousel-next">&#10095;</button>
            <div class="carousel-dots"></div>
          </div>
        </div>
        <div class="about-right" id="aboutContent"></div>
      </div>
    </section>

    <!-- ========== 体育（竞技） ========== -->
    <section class="page-section" id="page-sports">
      <div class="section-header">
        <h1>体育（竞技）</h1>
        <div class="section-divider"></div>
      </div>
      <div class="sports-layout">
        <div class="sports-left">
          <div class="carousel-container" id="sportsCarousel">
            <div class="carousel-track"></div>
            <button class="carousel-btn carousel-prev">&#10094;</button>
            <button class="carousel-btn carousel-next">&#10095;</button>
            <div class="carousel-dots"></div>
          </div>
        </div>
        <div class="sports-right" id="sportsContent"></div>
      </div>
      <!-- 运动详情页 -->
      <div class="detail-overlay" id="sportsDetail">
        <div class="detail-modal">
          <button class="detail-close" id="sportsDetailClose">&times;</button>
          <div id="sportsDetailContent"></div>
        </div>
      </div>
    </section>

    <!-- ========== 学术成就 ========== -->
    <section class="page-section" id="page-academic">
      <div class="section-header">
        <h1>学术成就</h1>
        <div class="section-divider"></div>
      </div>
      <div class="academic-layout">
        <div class="academic-left">
          <div class="carousel-container" id="academicCarousel">
            <div class="carousel-track"></div>
            <button class="carousel-btn carousel-prev">&#10094;</button>
            <button class="carousel-btn carousel-next">&#10095;</button>
            <div class="carousel-dots"></div>
          </div>
        </div>
        <div class="academic-right" id="academicContent"></div>
      </div>
      <!-- 学术详情页 -->
      <div class="detail-overlay" id="academicDetail">
        <div class="detail-modal">
          <button class="detail-close" id="academicDetailClose">&times;</button>
          <div id="academicDetailContent"></div>
        </div>
      </div>
    </section>

    <!-- ========== 西藏 ========== -->
    <section class="page-section" id="page-tibet">
      <div class="section-header">
        <h1>西藏项目</h1>
        <div class="section-divider"></div>
      </div>
      <div class="tibet-intro" id="tibetIntro"></div>
      <div class="tibet-carousel">
        <div class="carousel-container" id="tibetCarousel">
          <div class="carousel-track"></div>
          <button class="carousel-btn carousel-prev">&#10094;</button>
          <button class="carousel-btn carousel-next">&#10095;</button>
          <div class="carousel-dots"></div>
        </div>
      </div>
      <div class="tibet-timeline" id="tibetTimeline"></div>
    </section>

    <!-- ========== 社团 ========== -->
    <section class="page-section" id="page-clubs">
      <div class="section-header">
        <h1>社团活动</h1>
        <div class="section-divider"></div>
      </div>
      <div class="clubs-layout">
        <div class="clubs-left">
          <div class="carousel-container" id="clubsCarousel">
            <div class="carousel-track"></div>
            <button class="carousel-btn carousel-prev">&#10094;</button>
            <button class="carousel-btn carousel-next">&#10095;</button>
            <div class="carousel-dots"></div>
          </div>
        </div>
        <div class="clubs-right" id="clubsContent"></div>
      </div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-content">
      <p id="footerText">&copy; 2024 Owen. All rights reserved.</p>
      <p id="contactEmail"></p>
      <p><a href="/admin" class="admin-link">后台管理</a></p>
    </div>
  </footer>

  <script src="/js/app.js"></script
